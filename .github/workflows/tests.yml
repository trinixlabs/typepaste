name: TypePaste Tests

on:
  pull_request:
    paths:
      - ".github/workflows/tests.yml"
      - "TypePaste/**/*.swift"
      - "TypePaste/**/*.plist"
      - "TypePaste/**/*.entitlements"
      - "TypePaste/**/*.xcassets/**"
      - "TypePaste/**/*.xcodeproj/**"
      - "TypePaste/**/*.xcworkspace/**"
      - "TypePaste/Package.swift"

jobs:
  xcode-unit-tests:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild test \
            -project TypePaste/TypePaste.xcodeproj \
            -scheme TypePaste \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            -only-testing:TypePasteTests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
